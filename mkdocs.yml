site_name: autotester
site_description: Program-driven coding-agent loops backed by ttasks and GitHub Copilot.
site_url: https://ipdelete.github.io/autotester/
repo_url: https://github.com/ipdelete/autotester
repo_name: ipdelete/autotester
use_directory_urls: true

theme:
  name: material
  palette:
    scheme: default
    primary: white
    accent: blue
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Commands: commands.md
  - Programs: programs.md
  - Modes:
      - Optimize mode: modes/optimize.md
      - Bugfix mode: modes/bugfix.md
  - Storage: storage.md
  - Development: development.md
